name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write  # Required for OIDC auth to AWS
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production  # Requires manual approval in GitHub

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Run tests (gate deployment)
        run: bash scripts/run-tests.sh

      - name: Build Lambda packages
        run: bash scripts/build-lambdas.sh --env prod --region us-east-1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform init
        working-directory: infra/envs/prod
        run: terraform init -backend-config=backend.tfvars

      - name: Terraform plan
        working-directory: infra/envs/prod
        run: terraform plan -var-file=terraform.tfvars -out=tfplan

      - name: Terraform apply
        working-directory: infra/envs/prod
        run: terraform apply tfplan

      - name: Pull SSM config and write frontend env
        run: |
          get_param() {
            aws ssm get-parameter --name "$1" --query "Parameter.Value" --output text
          }
          {
            echo "VITE_API_BASE_URL=$(get_param /radius/prod/api/endpoint)"
            echo "VITE_COGNITO_USER_POOL_ID=$(get_param /radius/prod/cognito/user_pool_id)"
            echo "VITE_COGNITO_CLIENT_ID=$(get_param /radius/prod/cognito/client_id)"
          } > frontend/.env.production

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: npm ci && npm run build
        working-directory: frontend

      - name: Deploy frontend to S3
        run: |
          BUCKET=$(aws ssm get-parameter \
            --name "/radius/prod/frontend/bucket" \
            --query "Parameter.Value" --output text)
          aws s3 sync frontend/dist/ "s3://${BUCKET}" --delete

      - name: Invalidate CloudFront cache
        run: |
          DIST_ID=$(aws ssm get-parameter \
            --name "/radius/prod/cloudfront/distribution_id" \
            --query "Parameter.Value" --output text)
          aws cloudfront create-invalidation \
            --distribution-id "${DIST_ID}" \
            --paths "/*"
